description: "Example workflow demonstrating structured output and conditional next steps."
# Safety valve for loops such as execute -> verify -> execute.
# Defaults to 50 when omitted.
maxTransitions: 12

phases:
  - id: plan
    thinking: high
    output:
      type: text
      description: "Markdown implementation plan."
    tools:
      - read
      - find
      - ls
    system: |
      You are the planning phase. Inspect only; do not modify files.
    prompt: |
      Task:
      {{input}}

      Produce an implementation plan.

  # No `next` here: absent next means continue to the next phase in YAML order.
  - id: execute
    thinking: medium
    output:
      type: text
      description: "Markdown execution report."
    tools:
      - read
      - edit
      - write
      - bash
    prompt: |
      Original task:
      {{input}}

      Plan:
      {{phase.plan.output}}

      Previous verification feedback, if this is a retry:
      {{phase.verify.output?}}

      Implement the plan. If verification feedback exists, fix those failures first.

  - id: verify
    thinking: medium
    output:
      type: structured
      status:
        enum: [PASS, FAIL]
        description: "PASS when all verification checks pass; FAIL when remediation is needed."
      report: "Complete Markdown verification report."
      data:
        description: "Optional verification metrics."
        fields:
          failedChecks:
            type: integer
            description: "Number of failed checks."
    tools:
      - read
      - bash
    next:
      - if:
          status: FAIL
        goto: execute
      - if:
          status: PASS
        goto: review
      # Catch-all: if the model returns an unexpected status, stop instead of falling through.
      - end: true
    prompt: |
      Original task:
      {{input}}

      Plan:
      {{phase.plan.output}}

      Execution report:
      {{phase.execute.output}}

      Verify the implementation.

  - id: review
    thinking: high
    output:
      type: structured
      status:
        enum: [HAS_COMMENTS, APPROVED]
        description: "HAS_COMMENTS when review found actionable comments; APPROVED otherwise."
      report: "Complete Markdown review report."
      data:
        description: "Machine-readable review routing data."
        fields:
          hasComments:
            type: boolean
            description: "True when there are actionable review comments/findings."
    tools:
      - read
      - bash
    next:
      # Continue only when review produced comments/findings.
      - if:
          field: data.hasComments
          equals: true
        goto: address-review
      # Otherwise end the workflow here.
      - end: true
    prompt: |
      Original task:
      {{input}}

      Verification report:
      {{phase.verify.output}}

      Review the work.

  - id: address-review
    thinking: medium
    tools:
      - read
      - edit
      - write
      - bash
    prompt: |
      Original task:
      {{input}}

      Review report:
      {{phase.review.output}}

      Review status:
      {{phase.review.status}}

      Review machine-readable data:
      {{phase.review.data}}

      Address the review comments and report what changed.
