name: Deploy ArabiLogia

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v2.7.8b)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang pkg-config libgtk-3-dev dpkg-dev

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ github.event.inputs.version }}
          TAG="$VERSION"
          ANDROID_ARM64="arabilogia-android-arm64-v8a-${VERSION//./_}.apk"
          ANDROID_ARMEABI="arabilogia-android-armeabi-v7a-${VERSION//./_}.apk"
          ANDROID_X86_64="arabilogia-android-x86_64-${VERSION//./_}.apk"
          LINUX_X64="arabilogia-linux-x64-${VERSION//./_}.tar.xz"

          # Rename APKs to the desired naming convention
          mkdir -p build/outputs/release
          cp build/outputs/apk/app-arm64-v8a-release.apk "build/outputs/release/$ANDROID_ARM64" 2>/dev/null || true
          cp build/outputs/apk/app-armeabi-v7a-release.apk "build/outputs/release/$ANDROID_ARMEABI" 2>/dev/null || true
          cp build/outputs/apk/app-x86_64-release.apk "build/outputs/release/$ANDROID_X86_64" 2>/dev/null || true
          cp build/outputs/linux/arabilogia-*-linux-x64.tar.xz "build/outputs/release/$LINUX_X64" 2>/dev/null || true

          # Create release if tag exists, otherwise skip
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, uploading assets..."
            gh release upload "$TAG" build/outputs/release/* --clobber
          else
            echo "Creating release $TAG..."
            NOTES="## ArabiLogia $VERSION\n\n### Downloads\n- [Android ARM64]($ANDROID_ARM64)\n- [Android ARMv7a]($ANDROID_ARMEABI)\n- [Android x86_64]($ANDROID_X86_64)\n- [Linux x64]($LINUX_X64)"
            gh release create "$TAG" build/outputs/release/* \
              --title "ArabiLogia $VERSION" \
              --notes "$NOTES" \
              --target main
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APKs
        run: |
          flutter build apk --release --split-per-abi
          mkdir -p build/outputs/apk
          cp build/app/outputs/flutter-apk/*-release.apk build/outputs/apk/

      - name: Build Linux
        run: |
          flutter build linux --release

      - name: Package Linux tar.xz
        run: |
          mkdir -p build/outputs/linux
          tar -cJf build/outputs/linux/arabilogia-${{ github.event.inputs.version }}-linux-x64.tar.xz -C build/linux/x64/release/bundle .

      - name: Package Linux deb
        run: |
          DEB_ROOT=/tmp/arabilogia-deb
          mkdir -p $DEB_ROOT/usr/bin/arabilogia $DEB_ROOT/DEBIAN
          cp -r build/linux/x64/release/bundle/* $DEB_ROOT/usr/bin/arabilogia/
          echo -e "Package: arabilogia\nVersion: ${{ github.event.inputs.version }}\nSection: education\nPriority: optional\nArchitecture: amd64\nMaintainer: ArabiLogia\nDescription: ArabiLogia Arabic Learning App" > $DEB_ROOT/DEBIAN/control
          dpkg-deb --build $DEB_ROOT build/outputs/linux/arabilogia-${{ github.event.inputs.version }}-amd64.deb

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel --yes --prod

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/outputs/