name: Deploy ArabiLogia

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v2.7.8b)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang pkg-config libgtk-3-dev dpkg-dev

      - name: Update version files
        run: |
          VERSION=${{ github.event.inputs.version }}
          # Strip leading 'v' and trailing letter suffix for pubspec (e.g. v2.7.8b -> 2.7.8b+1)
          PUBSPEC_VERSION=$(echo "$VERSION" | sed 's/^v//;s/[a-zA-Z]$//' | sed 's/$/+1/')
          # Update pubspec.yaml
          sed -i "s/^version:.*/version: $PUBSPEC_VERSION/" pubspec.yaml

          # Update legal_content.dart
          DATE=$(date "+%B %d, %Y")
          sed -i "s/'الإصدار الحالي: v[0-9.b]* | تاريخ الإصدار: [^}]*'/'الإصدار الحالي: $VERSION | تاريخ الإصدار: $DATE'/" lib/core/constants/legal_content.dart

          # Update dashboard_shell.dart
          sed -i "s/'v[0-9.b]*'/'${VERSION#v}'/" lib/features/dashboard/screens/dashboard_shell.dart

          # Update dashboard_sidebar.dart
          sed -i "s/'v[0-9.b]*'/'${VERSION#v}'/" lib/features/dashboard/widgets/dashboard_sidebar.dart

      - name: Commit and tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "release ${{ github.event.inputs.version }}"
          git tag ${{ github.event.inputs.version }}
          git push origin main --tags

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APKs
        run: |
          flutter build apk --release --split-per-abi
          mkdir -p build/outputs/apk
          cp build/app/outputs/flutter-apk/*-release.apk build/outputs/apk/

      - name: Build Linux
        run: |
          flutter build linux --release

      - name: Package Linux tar.xz
        run: |
          mkdir -p build/outputs/linux
          tar -cJf build/outputs/linux/arabilogia-${{ github.event.inputs.version }}-linux-x64.tar.xz -C build/linux/x64/release/bundle .

      - name: Package Linux deb
        run: |
          DEB_ROOT=/tmp/arabilogia-deb
          mkdir -p $DEB_ROOT/usr/bin/arabilogia $DEB_ROOT/DEBIAN
          cp -r build/linux/x64/release/bundle/* $DEB_ROOT/usr/bin/arabilogia/
          echo -e "Package: arabilogia\nVersion: ${{ github.event.inputs.version }}\nSection: education\nPriority: optional\nArchitecture: amd64\nMaintainer: ArabiLogia\nDescription: ArabiLogia Arabic Learning App" > $DEB_ROOT/DEBIAN/control
          dpkg-deb --build $DEB_ROOT build/outputs/linux/arabilogia-${{ github.event.inputs.version }}-amd64.deb

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel --yes --prod

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/outputs/