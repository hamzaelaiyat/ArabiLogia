name: Build Windows App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.0.3)'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'Bug fixes and performance improvements'

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.28.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows using Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -w /src \
            tauu/flutter-windows-builder:latest \
            flutter build windows --release

      - name: Create release bundle
        run: |
          cd build/windows/runner/Release
          # Include all required files
          mkdir -p release-files
          cp *.exe release-files/
          cp *.dll release-files/
          cp -r data release-files/
          cd release-files
          zip -r ../../../arabilogia-${{ inputs.version }}-windows-x64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/arabilogia-${{ inputs.version }}-windows-x64.zip

  build-all:
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.28.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Build Linux
        run: |
          flutter build linux --release
          cd build/linux/release
          tar -cvJf ../../../arabilogia-${{ inputs.version }}-linux-x64.tar.xz .

      - name: Build Web
        run: flutter build web --web-renderer html --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/arabilogia-${{ inputs.version }}-linux-x64.tar.xz
            build/web

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: ArabiLogia v${{ inputs.version }}
          body: ${{ inputs.notes }}
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            arabilogia-${{ inputs.version }}-linux-x64.tar.xz
            arabilogia-${{ inputs.version }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Vercel
        run: |
          # Install Vercel CLI
          npm install -g vercel
          # Pull Vercel environment
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          # Build and deploy
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
