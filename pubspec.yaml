name: arabilogia
description: "منصة عربيلوجيا - منصة لغة عربية للثانوية العامة"
publish_to: 'none'
version: 0.0.2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  supabase_flutter: ^2.8.1
  provider: ^6.1.2
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_dotenv: ^5.1.2
  path: ^1.9.1
  image: ^4.8.0
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.3
  app_installer_plus: ^1.1.0
  http: ^1.2.0
  package_info_plus: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/fonts/
    - assets/icons/
    - assets/images/