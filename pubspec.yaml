name: arabilogia
description: "منصة عربيلوجيا - منصة لغة عربية للثانوية العامة"
publish_to: 'none'
version: 26.7.20+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  supabase_flutter: ^2.8.1
  provider: ^6.1.2
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1

  shared_preferences: ^2.5.3
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_dotenv: ^5.1.2
  path: ^1.9.1
  image: ^4.8.0
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.3
  app_installer_plus: ^1.1.0
  http: ^1.2.0
  package_info_plus: ^8.0.3
  flutter_markdown: ^0.7.7
  google_mobile_ads: ^5.1.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  shimmer: ^3.0.0
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.5
  test: ^1.25.0
  drift_dev: ^2.25.0
  build_runner: ^2.4.0
  sqlite3: ^2.4.0

flutter:
  uses-material-design: true

  fonts:
    - family: Estedad
      fonts:
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 100
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 200
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 300
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 400
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 500
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 600
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 700
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 800
        - asset: assets/fonts/Estedad-Variable.ttf
          weight: 900

  assets:
    - .env
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/images/album/
